services:
  workforce-service:
    image: ghcr.io/sharidahcompany/workforce-service:latest
    container_name: workforce-service
    restart: unless-stopped
    working_dir: /var/www
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
    volumes:
      - workforce_storage:/var/www/storage
      - workforce_cache:/var/www/bootstrap/cache
    networks:
      - ceo_network
    depends_on:
      - workforce-mysql

  workforce-web:
    image: nginx:alpine
    container_name: workforce-web
    restart: unless-stopped
    ports:
      - "127.0.0.1:8002:80"
    volumes:
      - ./:/var/www:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - workforce-service
    networks:
      - ceo_network

  workforce-kafka-consumer:
    image: ghcr.io/sharidahcompany/workforce-service:latest
    container_name: workforce-kafka-consumer
    restart: unless-stopped
    working_dir: /var/www
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
    volumes:
      - workforce_storage:/var/www/storage
      - workforce_cache:/var/www/bootstrap/cache
    networks:
      - ceo_network
    depends_on:
      - workforce-service
    command: php artisan kafka:consume:generic

  workforce-mysql:
    image: mysql:8.0
    container_name: workforce-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: admin
      MYSQL_DATABASE: workforce_service
      MYSQL_USER: admin
      MYSQL_PASSWORD: admin
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql-init:/docker-entrypoint-initdb.d
    networks:
      - ceo_network

  workforce-scheduler:
    image: ghcr.io/sharidahcompany/workforce-service:latest
    container_name: workforce-scheduler
    restart: unless-stopped
    working_dir: /var/www
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
    volumes:
      - workforce_storage:/var/www/storage
      - workforce_cache:/var/www/bootstrap/cache
    networks:
      - ceo_network
    depends_on:
      - workforce-service
      - workforce-mysql
    command: php artisan schedule:work

networks:
  ceo_network:
    external: true

volumes:
  mysql_data:
  workforce_storage:
  workforce_cache:
