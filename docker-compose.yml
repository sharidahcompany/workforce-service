services:
  workforce-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: workforce-service
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - /srv/ceo-app/microservices/workforce-service:/var/www
      - /srv/ceo-app/microservices/workforce-service/storage:/var/www/storage
      - /srv/ceo-app/microservices/workforce-service/bootstrap/cache:/var/www/bootstrap/cache
      - workforce_vendor:/var/www/vendor

    networks:
      - ceo_network
    depends_on:
      - workforce-mysql

  workforce-web:
    image: nginx:alpine
    container_name: workforce-web
    restart: unless-stopped
    ports:
      - "8006:80"
    volumes:
      - /srv/ceo-app/microservices/workforce-service:/var/www
      - /srv/ceo-app/microservices/workforce-service/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - workforce-service
    networks:
      - ceo_network

  workforce-kafka-consumer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: workforce-kafka-consumer
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - /srv/ceo-app/microservices/workforce-service:/var/www
      - /srv/ceo-app/microservices/workforce-service/storage:/var/www/storage
      - /srv/ceo-app/microservices/workforce-service/bootstrap/cache:/var/www/bootstrap/cache
      - workforce_vendor:/var/www/vendor
    networks:
      - ceo_network
    depends_on:
      - workforce-service
    command: php artisan kafka:consume:generic

  workforce-mysql:
    image: mysql:8.0
    container_name: workforce-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: admin
      MYSQL_DATABASE: workforce_service
      MYSQL_USER: admin
      MYSQL_PASSWORD: admin
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql-init:/docker-entrypoint-initdb.d
    ports:
      - "3312:3306"
    networks:
      - ceo_network

networks:
  ceo_network:
    external: true

volumes:
  mysql_data:
  workforce_vendor:
  workforce_storage:
  workforce_cache:
