name: Build & Deploy Workforce

on:
  push:
    branches: ["production"]

permissions:
  contents: read
  packages: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        run: |
          docker build \
            -t ghcr.io/sharidahcompany/workforce-service:${{ github.sha }} \
            -t ghcr.io/sharidahcompany/workforce-service:latest \
            -f Dockerfile .

      - name: Push image
        run: |
          docker push ghcr.io/sharidahcompany/workforce-service:${{ github.sha }}
          docker push ghcr.io/sharidahcompany/workforce-service:latest

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /srv/ceo-app/microservices/workforce-service

            git fetch origin
            git checkout production
            git reset --hard origin/production

            # Update image
            docker pull ghcr.io/sharidahcompany/workforce-service:latest

            # Bring up production stack using prod compose file
            docker compose -f docker-compose.prod.yml up -d --no-deps

            docker image prune -f
